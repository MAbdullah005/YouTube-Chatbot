<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | YouTube Chatbot</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>YouTube Chatbot</h1>

<div class="auth-box">
    <h2 id="title">Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="submitBtn">Login</button>

    <div class="switch" id="switchBtn">Create account</div>
    <div class="error" id="msg"></div>
</div>

<script>
let mode = "login";

const submitBtn = document.getElementById("submitBtn");
const switchBtn = document.getElementById("switchBtn");
const msg = document.getElementById("msg");

// If already logged in → go to chat
if (localStorage.getItem("token")) {
    window.location.href = "/chat";
}

switchBtn.addEventListener("click", () => {
    mode = mode === "login" ? "signup" : "login";

    document.getElementById("title").innerText =
        mode === "login" ? "Login" : "Signup";

    submitBtn.innerText =
        mode === "login" ? "Login" : "Signup";

    switchBtn.innerText =
        mode === "login"
            ? "Create account"
            : "Already have an account?";
});

submitBtn.addEventListener("click", async () => {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        msg.innerText = "Email and password required";
        return;
    }

    const url = mode === "login"
        ? "/auth/login"
        : "/auth/signup";

    try {
        const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
            msg.innerText = data.detail || "Authentication failed";
            return;
        }

        if (mode === "signup") {
            msg.innerText = "Account created. Please login.";
            mode = "login";
            submitBtn.innerText = "Login";
            switchBtn.innerText = "Create account";
            return;
        }

        // LOGIN SUCCESS
        //----
        //document
        console.log("LOGIN RESPONSE:", data);

        if (!data.access_token) {
            msg.innerText = "Login failed. No token returned.";
            return;
            }

        localStorage.setItem("token", data.access_token);

        console.log("TOKEN SAVED:", localStorage.getItem("token"));

        window.location.href = "/chat";

        //-----

    } catch {
        msg.innerText = "Server error";
    }
});
</script>

</body>
</html>
