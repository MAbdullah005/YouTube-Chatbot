<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube RAG Chatbot</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🎥 AI Chat</h2>

        <div id="profileBox" class="profile-box">
            Loading profile...
        </div>

        <h3>Your Videos</h3>
        <ul id="sessionList"></ul>

        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <h1>🎥 YouTube RAG Chatbot</h1>
        </div>

        <div class="url-box">
            <input type="text" id="videoUrl" placeholder="Paste YouTube Video URL">
            <button id="loadBtn">Load Video</button>
        </div>

        <div class="main-container">

            <div class="video-container">
                <iframe id="ytPlayer" allowfullscreen></iframe>
            </div>

            <div class="chat-container">
                <div class="chat-box" id="chatBox"></div>

                <div class="chat-input">
                    <textarea id="question" placeholder="Ask something about the video..."></textarea>
                    <button id="askBtn">Ask</button>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

const token = localStorage.getItem("token");
if (!token) {
    window.location.href = "/";
    return;
}

// DOM Elements
const loadBtn = document.getElementById("loadBtn");
const askBtn = document.getElementById("askBtn");
const logoutBtn = document.getElementById("logoutBtn");
const videoInput = document.getElementById("videoUrl");
const questionInput = document.getElementById("question");
const chatBox = document.getElementById("chatBox");
const videoPlayer = document.getElementById("ytPlayer");
const profileBox = document.getElementById("profileBox");
const sessionList = document.getElementById("sessionList");

let videoLoaded = false;

/* ---------------- PROFILE ---------------- */
async function loadProfile() {
    try {
        const res = await fetch("/auth/me", {
            headers: { "Authorization": "Bearer " + token }
        });

        if (!res.ok) {
            localStorage.removeItem("token");
            window.location.href = "/";
            return;
        }

        const user = await res.json();
        profileBox.innerHTML =
            `👤 ${user.email}<br>
             ✅ Verified: ${user.is_verified ? "Yes" : "No"}`;

    } catch {
        profileBox.innerText = "Error loading profile";
    }
}

/* ---------------- SESSIONS ---------------- */
async function loadSessions() {
    try {
        const res = await fetch("/chat/sessions", {
            headers: { "Authorization": "Bearer " + token }
        });

        if (!res.ok) return;

        const sessions = await res.json();
        sessionList.innerHTML = "";

        sessions.forEach(s => {
            const li = document.createElement("li");
            li.innerText =
                `Video: ${s.video_id} (${new Date(s.created_at).toLocaleString()})`;

            li.addEventListener("click", () => {
                videoInput.value = `https://youtu.be/${s.video_id}`;
                loadVideo();
            });

            sessionList.appendChild(li);
        });

    } catch {}
}

/* ---------------- LOGOUT ---------------- */
logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("token");
    window.location.href = "/";
});

/* ---------------- VIDEO LOGIC ---------------- */
function extractVideoId(url) {
    try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtube.com")) {
            return parsed.searchParams.get("v");
        } else if (parsed.hostname.includes("youtu.be")) {
            return parsed.pathname.slice(1);
        }
    } catch {}
    return null;
}

function loadVideo() {
    const url = videoInput.value.trim();
    const videoId = extractVideoId(url);

    if (!videoId) {
        alert("Invalid YouTube URL");
        return;
    }

    videoPlayer.src =
        `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;

    videoLoaded = true;
    chatBox.innerHTML = "";
    loadHistory(url);
}

loadBtn.addEventListener("click", loadVideo);

/* ---------------- LOAD CHAT HISTORY ---------------- */
async function loadHistory(video_url) {
    try {
        const res = await fetch(
            `/chat/history?video_url=${encodeURIComponent(video_url)}`,
            {
                headers: { "Authorization": "Bearer " + token }
            }
        );

        if (!res.ok) return;

        const messages = await res.json();
        chatBox.innerHTML = "";

        messages.forEach(msg => {
            appendMessage(
                msg.content,
                msg.role === "assistant" ? "bot" : "user"
            );
        });

    } catch {}
}

/* ---------------- CHAT ---------------- */
function appendMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = `message ${sender}`;
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msg;
}

askBtn.addEventListener("click", () => {

    const video_url = videoInput.value.trim();
    const question = questionInput.value.trim();

    if (!videoLoaded) {
        alert("Load a video first");
        return;
    }

    if (!question) {
        alert("Enter a question");
        return;
    }

    appendMessage(question, "user");
    questionInput.value = "";

    const botMsg = appendMessage("🤖 ", "bot");

    const streamUrl =
        `/stream?video_url=${encodeURIComponent(video_url)}`
        + `&question=${encodeURIComponent(question)}`
        + `&token=${encodeURIComponent(token)}`;

    const eventSource = new EventSource(streamUrl);

    eventSource.onmessage = (event) => {
        if (event.data === "[DONE]") {
            eventSource.close();
            return;
        }
        botMsg.innerText += event.data;
    };

    eventSource.onerror = () => {
        botMsg.innerText += "\nError while streaming";
        eventSource.close();
    };
});

/* ---------------- INIT ---------------- */
loadProfile().then(loadSessions);

});
</script>

</body>
</html>
