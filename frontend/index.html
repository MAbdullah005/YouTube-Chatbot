<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube RAG Chatbot</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🎥 YouTube Video Chatbot</h1>

<div id="profileBox" style="
    position:absolute;
    top:20px;
    left:20px;
    background:#ffffff;
    padding:10px 15px;
    border-radius:10px;
    font-size:14px;
    color:black;
">
    Loading profile...
</div>
<div class="sidebar">
    <h2>🎥 AI Chat</h2>
    <div id="profileBox"></div>
    <h3>Your Videos</h3>
    <ul id="sessionList"></ul>
    <button id="logoutBtn">Logout</button>
</div>

<div class="layout">
    <div class="sidebar">
        <h2>🎥 AI Chat</h2>
        <button id="logoutBtn">Logout</button>
        <div id="profileBox"></div>
    </div>

    <div class="main">
        <!-- video + chat -->
    </div>
</div>

<button id="logoutBtn" style="position:absolute; top:20px; right:20px;">
Logout
</button>

<div class="url-box">
    <input type="text" id="videoUrl" placeholder="Paste YouTube Video URL">
    <button id="loadBtn">Load Video</button>
</div>

<div class="main-container">

    <div class="video-container">
        <iframe id="ytPlayer" width="560" height="315" allowfullscreen></iframe>
    </div>

    <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input">
            <textarea id="question" placeholder="Ask something about the video..."></textarea>
            <button id="askBtn">Ask</button>
        </div>
    </div>

</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/";
}

// ---------------- PROFILE ----------------
async function loadProfile() {
    try {
        const res = await fetch("/auth/me", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!res.ok) {
            localStorage.removeItem("token");
            window.location.href = "/";
            return;
        }

        const user = await res.json();

        document.getElementById("profileBox").innerHTML =
            `👤 ${user.email} <br>
             ✅ Verified: ${user.is_verified ? "Yes" : "No"}`;

    } catch (err) {
        document.getElementById("profileBox").innerText =
            "Error loading profile";
    }
}




async function loadSessions() {
    const res = await fetch("/chat/sessions", {
        headers: { "Authorization": "Bearer " + token }
    });

    if (!res.ok) return;

    const sessions = await res.json();
    const sessionList = document.getElementById("sessionList");
    sessionList.innerHTML = "";

    sessions.forEach(s => {
        const li = document.createElement("li");
        li.innerText = `Video: ${s.video_id} (${new Date(s.created_at).toLocaleString()})`;
        li.style.cursor = "pointer";
        li.addEventListener("click", () => {
            videoInput.value = `https://youtu.be/${s.video_id}`;
            loadBtn.click();  // simulate loading video
        });
        sessionList.appendChild(li);
    });
}

// Call after loading profile
loadProfile().then(loadSessions);

// ---------------- LOGOUT ----------------
document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("token");
    window.location.href = "/";
});

// ---------------- VIDEO + CHAT ----------------
const loadBtn = document.getElementById("loadBtn");
const askBtn = document.getElementById("askBtn");
const videoInput = document.getElementById("videoUrl");
const questionInput = document.getElementById("question");
const chatBox = document.getElementById("chatBox");
const videoPlayer = document.getElementById("ytPlayer");

let videoLoaded = false;

function extractVideoId(url) {
    try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtube.com")) {
            return parsed.searchParams.get("v");
        } else if (parsed.hostname.includes("youtu.be")) {
            return parsed.pathname.slice(1);
        }
    } catch {}
    return null;
}

loadBtn.addEventListener("click", () => {
    const url = videoInput.value.trim();
    const videoId = extractVideoId(url);

    if (!videoId) {
        alert("Invalid YouTube URL");
        return;
    }

    videoPlayer.src =
        `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;

    videoLoaded = true;
    chatBox.innerHTML = "";
    loadHistory(url);



    async function loadHistory(video_url) {
    const res = await fetch(
        `/chat/history?video_url=${encodeURIComponent(video_url)}`,
        {
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    const messages = await res.json();

    chatBox.innerHTML = "";

    messages.forEach(msg => {
        appendMessage(msg.content, msg.role === "assistant" ? "bot" : "user");
    });
}



});

function appendMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = `message ${sender}`;
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msg;
}

askBtn.addEventListener("click", () => {

    const video_url = videoInput.value.trim();
    const question = questionInput.value.trim();

    if (!videoLoaded) {
        alert("Load a video first");
        return;
    }

    if (!question) {
        alert("Enter a question");
        return;
    }

    appendMessage(question, "user");
    questionInput.value = "";

    const botMsg = appendMessage("🤖 ", "bot");

    const streamUrl =
        `/stream?video_url=${encodeURIComponent(video_url)}`
        + `&question=${encodeURIComponent(question)}`
        + `&token=${encodeURIComponent(token)}`;

    const eventSource = new EventSource(streamUrl);

    eventSource.onmessage = (event) => {
        if (event.data === "[DONE]") {
            eventSource.close();
            return;
        }
        botMsg.innerText += event.data;
    };

    eventSource.onerror = () => {
        botMsg.innerText += "\nError while streaming";
        eventSource.close();
    };
});
</script>

</body>
</html>
